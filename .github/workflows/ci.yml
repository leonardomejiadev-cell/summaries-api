name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: summaries
          POSTGRES_PASSWORD: summaries
          POSTGRES_DB: summaries
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U summaries -d summaries"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://summaries:summaries@localhost:5432/summaries
      TEST_DATABASE_URL: postgresql+asyncpg://summaries:summaries@localhost:5432/summaries
      SECRET_KEY: ci-test-secret-not-used-in-production

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . --tag summaries-api:ci
